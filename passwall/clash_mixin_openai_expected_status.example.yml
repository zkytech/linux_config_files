# Optional mihomo / Clash.Meta native override for OpenAI health checks.
# Use this only in clients that merge proxy-groups by name after subconverter output.
# It upgrades the API group from a generic 200 probe to an API-specific 401 probe.

proxy-groups:
  - name: "🤖 OpenAI API 稳定优先"
    type: fallback
    proxies:
      - "🤖 OpenAI 新加坡"
      - "🤖 OpenAI 日本"
      - "🤖 OpenAI 美国"
      - "🤖 OpenAI 台湾"
      - "🤖 OpenAI 手动兜底"
    url: "https://api.openai.com/v1/models"
    expected-status: 401
    interval: 180
    timeout: 5000
    lazy: false
    max-failed-times: 2

  - name: "🤖 ChatGPT Web 稳定优先"
    type: fallback
    proxies:
      - "🤖 OpenAI 新加坡"
      - "🤖 OpenAI 日本"
      - "🤖 OpenAI 美国"
      - "🤖 OpenAI 台湾"
      - "🤖 OpenAI 手动兜底"
    url: "https://chatgpt.com/cdn-cgi/trace"
    expected-status: 200
    interval: 180
    timeout: 5000
    lazy: false
    max-failed-times: 2
