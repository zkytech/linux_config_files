; AI 优先策略：按需求将所有 url-test 统一为 ChatGPT 实站 HTTPS 探测。
; 这能避免 Google/gstatic 探测误导 AI 流量，但不再代表流媒体/游戏等非 AI 场景的最优节点。
; AI 自动选择保留为独立组，候选池仅保留实测更适合 ChatGPT 的台湾、新加坡、日本、美国节点，避免其他地区误入自动选择。
