
[custom]
; 自定义规则入口。
; 三份 Clash 模板的主要差异：
; 1) clash_rule_base.yml: 默认基线，redir-host + IPv6 开启，兼顾日常兼容性。
; 2) clash_rule_base.aggressive.yml: 历史命名保留，实际是 fake-ip + IPv6 关闭，命中更激进。
; 3) clash_rule_base.conservative.yml: 历史命名保留，实际是 redir-host + IPv6 关闭，适合先排查 IPv6/解析兼容性问题。

