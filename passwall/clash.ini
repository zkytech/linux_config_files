custom_proxy_group=Perplexity`select`[]🤖 ChatGPT Web 稳定优先`[]🤖 OpenAI 手动兜底`[]🤖 AI 自动选择`[]🚀 手动切换

custom_proxy_group=AI`select`[]🤖 ChatGPT Web 稳定优先`[]🤖 OpenAI API 稳定优先`[]🤖 OpenAI 手动兜底`[]🤖 AI 自动选择`[]🚀 手动切换

; OpenAI 稳定优先策略：拆分 API 与 ChatGPT Web，避免单个 URL test 代表全部 OpenAI 服务。
; subconverter 的 custom_proxy_group 无 expected-status 字段，因此这里使用返回 200 的 ChatGPT trace 作为兼容健康检查。
; mihomo/Clash.Meta 用户若要 API 级健康检查，请叠加 passwall/clash_mixin_openai_expected_status.example.yml，使用 api.openai.com/v1/models + expected-status: 401。
; 默认 AI 不再把 DIRECT、通用自动选择、HK/KR 放进自动链路；这些只保留在手动/回滚入口。
