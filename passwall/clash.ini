enable_rule_generator=true

overwrite_original_rules=true



; 模板选择说明：
; - clash_rule_base.yml：基线模板，redir-host + IPv6，适合作为默认排障/兼容性参考。
; - clash_rule_base.conservative.yml：保守模板，redir-host + IPv6 关闭，适合 IPv6/AAAA 路径不稳定场景。
; - clash_rule_base.aggressive.yml：激进模板，fake-ip + IPv6 关闭，命中更激进，兼容性问题时建议回退。
; 当前默认使用保守模板：redir-host + IPv6 关闭，优先降低 OpenAI/ChatGPT 双栈路径抖动。
; 若确认节点 IPv6 质量稳定，再切回基线模板；若需要 fake-ip 命中更激进，再改 aggressive。
clash_rule_base=https://raw.githubusercontent.com/zkytech/linux_config_files/master/passwall/clash_rule_base.conservative.yml

quanx_rule_base=https://raw.githubusercontent.com/zkytech/linux_config_files/master/passwall/quanx_rule_base.conf
